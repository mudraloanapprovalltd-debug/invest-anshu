<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invest with Anshu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #D4AF37; --gold-light: #F0D060; --gold-dark: #9A7B1A;
      --bg: #0A0A0F; --bg2: #111118; --bg3: #1A1A24;
      --surface: #16161F; --surface2: #1E1E2A;
      --border: rgba(212,175,55,0.15); --border2: rgba(212,175,55,0.08);
      --text: #F0EEE6; --text2: #8B8B9A;
      --green: #22C55E; --red: #EF4444; --blue: #3B82F6; --purple: #A855F7;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    h1,h2,h3,h4 { font-family: 'Playfair Display', serif; }
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,15,0.96); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .nav-brand { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); font-weight: 700; cursor: pointer; letter-spacing: -0.02em; }
    .nav-brand span { color: var(--text); font-weight: 300; }
    .nav-actions { display: flex; gap: 0.75rem; align-items: center; }
    .nav-wallet { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.4rem 1rem; font-size: 0.85rem; color: var(--gold); display: flex; align-items: center; gap: 0.5rem; cursor: pointer; transition: all 0.2s; }
    .nav-wallet:hover { border-color: var(--gold); }
    .nav-user-pill { display: flex; align-items: center; gap: 0.5rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.3rem 0.75rem; font-size: 0.82rem; color: var(--text2); cursor: pointer; }
    .btn { border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; border-radius: 8px; transition: all 0.2s; letter-spacing: 0.01em; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #000; padding: 0.5rem 1.25rem; font-size: 0.9rem; font-weight: 600; }
    .btn-gold:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(212,175,55,0.4); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 0.5rem 1.25rem; font-size: 0.9rem; }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-ghost { background: transparent; color: var(--text2); padding: 0.5rem 1rem; font-size: 0.9rem; }
    .btn-ghost:hover { color: var(--text); background: var(--surface2); border-radius: 8px; }
    .btn-large { padding: 1rem 2.5rem; font-size: 1.05rem; border-radius: 12px; }
    .btn-danger { background: var(--red); color: #fff; padding: 0.4rem 0.9rem; font-size: 0.82rem; }
    .btn-success { background: var(--green); color: #fff; padding: 0.4rem 0.9rem; font-size: 0.82rem; }
    .btn-blue { background: var(--blue); color: #fff; padding: 0.5rem 1.25rem; font-size: 0.9rem; }
    .btn-sm { padding: 0.28rem 0.7rem; font-size: 0.78rem; }
    .btn-full { width: 100%; padding: 0.85rem; font-size: 1rem; }
    .page { padding-top: 64px; min-height: 100vh; }
    .hero { min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; text-align: center; padding: 4rem 2rem; position: relative; overflow: hidden; }
    .hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(212,175,55,0.07) 0%, transparent 70%); }
    .hero-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(212,175,55,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(212,175,55,0.025) 1px, transparent 1px); background-size: 60px 60px; }
    .hero-content { position: relative; z-index: 1; max-width: 820px; }
    .hero-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(212,175,55,0.08); border: 1px solid var(--border); border-radius: 100px; padding: 0.4rem 1.2rem; font-size: 0.8rem; color: var(--gold); margin-bottom: 2rem; letter-spacing: 0.02em; }
    .hero-title { font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1.1; margin-bottom: 1.5rem; letter-spacing: -0.02em; }
    .hero-title .accent { color: var(--gold); }
    .hero-sub { font-size: 1.05rem; color: var(--text2); max-width: 520px; margin: 0 auto 2.5rem; line-height: 1.75; }
    .hero-cta { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 3rem; }
    .hero-stats { display: flex; gap: 3rem; justify-content: center; flex-wrap: wrap; padding-top: 2.5rem; border-top: 1px solid var(--border); }
    .stat { text-align: center; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--gold); font-weight: 700; }
    .stat-label { font-size: 0.78rem; color: var(--text2); margin-top: 0.3rem; letter-spacing: 0.05em; text-transform: uppercase; }
    .quotes-section { padding: 5rem 2rem; background: var(--bg2); }
    .plans-section { padding: 5rem 2rem; }
    .section-title { text-align: center; font-size: clamp(1.8rem, 4vw, 2.8rem); margin-bottom: 0.75rem; letter-spacing: -0.02em; }
    .section-sub { text-align: center; color: var(--text2); margin-bottom: 3rem; font-size: 1rem; }
    .quotes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; max-width: 1100px; margin: 0 auto; }
    .quote-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; position: relative; overflow: hidden; transition: transform 0.2s; }
    .quote-card:hover { transform: translateY(-4px); }
    .quote-card::before { content: '"'; position: absolute; top: -0.5rem; left: 1rem; font-family: 'Playfair Display', serif; font-size: 6rem; color: rgba(212,175,55,0.08); line-height: 1; }
    .quote-text { font-size: 0.95rem; line-height: 1.75; color: var(--text); position: relative; z-index: 1; }
    .quote-tag { margin-top: 1rem; display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: var(--gold); }
    .plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; max-width: 1100px; margin: 0 auto; }
    .plan-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; transition: all 0.3s; cursor: pointer; position: relative; overflow: hidden; border-top: 3px solid; }
    .plan-card:hover { border-color: var(--gold); transform: translateY(-4px); box-shadow: 0 20px 60px rgba(212,175,55,0.1); }
    .plan-asset-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-bottom: 1rem; }
    .plan-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; }
    .plan-asset { font-size: 0.8rem; color: var(--text2); margin-bottom: 1.5rem; letter-spacing: 0.05em; text-transform: uppercase; }
    .plan-return { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 700; color: var(--green); line-height: 1; }
    .plan-return-label { font-size: 0.78rem; color: var(--text2); margin-bottom: 1.25rem; margin-top: 0.25rem; }
    .plan-details { display: flex; flex-direction: column; gap: 0; margin-bottom: 1.5rem; }
    .plan-detail-row { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 0.5rem 0; border-bottom: 1px solid var(--border2); }
    .plan-detail-row:last-child { border-bottom: none; }
    .plan-detail-row .label { color: var(--text2); }
    .plan-detail-row .value { color: var(--text); font-weight: 500; }
    .auth-page { min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem; width: 100%; max-width: 440px; }
    .auth-title { font-size: 1.8rem; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    .auth-sub { color: var(--text2); font-size: 0.9rem; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; font-size: 0.82rem; color: var(--text2); margin-bottom: 0.4rem; font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; }
    .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; transition: border-color 0.2s; outline: none; }
    .form-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,0.08); }
    .form-input::placeholder { color: var(--text2); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text2); }
    .auth-footer a { color: var(--gold); cursor: pointer; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .alert { padding: 0.8rem 1rem; border-radius: 10px; font-size: 0.85rem; margin-bottom: 1rem; }
    .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #FCA5A5; }
    .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); color: #86EFAC; }
    .alert-info { background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.25); color: var(--gold-light); }
    .dashboard { padding: 2rem; max-width: 1200px; margin: 0 auto; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .dash-welcome { font-size: 1.5rem; letter-spacing: -0.02em; }
    .dash-welcome span { color: var(--gold); }
    .dash-nav-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .wallet-card { background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; position: relative; overflow: hidden; }
    .wallet-card::before { content: ''; position: absolute; right: -2rem; top: -2rem; width: 180px; height: 180px; background: radial-gradient(circle, rgba(212,175,55,0.06) 0%, transparent 70%); border-radius: 50%; }
    .wallet-balance { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 700; color: var(--gold); letter-spacing: -0.02em; }
    .wallet-label { font-size: 0.78rem; color: var(--text2); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .wallet-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .invest-cta { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem 2rem; text-align: center; margin-bottom: 2rem; }
    .invest-cta h2 { font-size: 1.8rem; margin-bottom: 0.75rem; }
    .invest-cta p { color: var(--text2); margin-bottom: 1.5rem; }
    .my-investments { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; }
    .my-investments h3 { margin-bottom: 1.25rem; font-size: 1.2rem; }
    .inv-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .inv-table th { text-align: left; padding: 0.5rem 0.75rem; color: var(--text2); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .inv-table td { padding: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.65rem; border-radius: 100px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .badge-success { background: rgba(34,197,94,0.12); color: var(--green); }
    .badge-pending { background: rgba(212,175,55,0.12); color: var(--gold); }
    .badge-running { background: rgba(59,130,246,0.12); color: var(--blue); }
    .badge-rejected { background: rgba(239,68,68,0.12); color: var(--red); }
    .empty-state { text-align: center; padding: 3rem; color: var(--text2); font-size: 0.9rem; }
    .profile-page { padding: 2rem; max-width: 900px; margin: 0 auto; }
    .profile-header { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); display: flex; align-items: center; justify-content: center; font-size: 2rem; font-family: 'Playfair Display', serif; color: #000; font-weight: 700; flex-shrink: 0; }
    .profile-info h2 { font-size: 1.6rem; letter-spacing: -0.02em; }
    .profile-info p { color: var(--text2); font-size: 0.9rem; margin-top: 0.25rem; }
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .profile-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1.75rem; }
    .profile-card h3 { font-size: 1.1rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; color: var(--gold); }
    .profile-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--border2); font-size: 0.88rem; }
    .profile-row:last-child { border-bottom: none; }
    .profile-row .key { color: var(--text2); }
    .profile-row .val { color: var(--text); font-weight: 500; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(8px); }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-title { font-size: 1.4rem; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    .modal-sub { color: var(--text2); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.3rem 0.7rem; color: var(--text2); cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .modal-close:hover { color: var(--text); border-color: var(--gold); }
    .payment-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .payment-row { display: flex; justify-content: space-between; padding: 0.55rem 0; border-bottom: 1px solid var(--border2); font-size: 0.88rem; align-items: center; }
    .payment-row:last-child { border-bottom: none; }
    .payment-row .key { color: var(--text2); }
    .payment-row .val { color: var(--text); font-weight: 500; display: flex; align-items: center; gap: 0.5rem; }
    .copy-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--gold); border-radius: 6px; padding: 0.15rem 0.45rem; font-size: 0.72rem; cursor: pointer; }
    .copy-btn:hover { background: rgba(212,175,55,0.1); }
    .admin-layout { display: flex; min-height: calc(100vh - 64px); }
    .admin-sidebar { width: 230px; background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 1rem; flex-shrink: 0; display: flex; flex-direction: column; }
    .admin-sidebar-title { font-size: 0.7rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 1rem; padding: 0 0.5rem; }
    .sidebar-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.65rem 0.75rem; border-radius: 10px; cursor: pointer; font-size: 0.88rem; color: var(--text2); transition: all 0.2s; margin-bottom: 0.2rem; }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active { background: rgba(212,175,55,0.1); color: var(--gold); border: 1px solid rgba(212,175,55,0.2); }
    .admin-content { flex: 1; padding: 2rem; overflow-y: auto; }
    .admin-section-title { font-size: 1.5rem; margin-bottom: 0.4rem; letter-spacing: -0.02em; }
    .admin-section-sub { color: var(--text2); font-size: 0.88rem; margin-bottom: 2rem; }
    .admin-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .admin-card h4 { font-size: 1rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
    .admin-stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .admin-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; }
    .admin-stat-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); font-weight: 700; }
    .admin-stat-label { font-size: 0.76rem; color: var(--text2); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    .data-table th { text-align: left; padding: 0.6rem 0.75rem; color: var(--text2); font-weight: 500; border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .data-table td { padding: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.025); vertical-align: middle; }
    .data-table tr:hover td { background: rgba(255,255,255,0.015); }
    .edit-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.75rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; width: 100%; outline: none; transition: border-color 0.2s; }
    .edit-input:focus { border-color: var(--gold); }
    .tab-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 0.5rem 1rem; font-size: 0.84rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }

    .contact-section { padding: 5rem 2rem; max-width: 800px; margin: 0 auto; }
    .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; }
    .contact-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; text-align: center; transition: all 0.2s; }
    .contact-card:hover { border-color: var(--gold); transform: translateY(-3px); }
    .contact-icon { font-size: 2rem; margin-bottom: 1rem; }
    .contact-label { font-size: 0.78rem; color: var(--text2); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .contact-value { font-size: 0.95rem; color: var(--text); font-weight: 500; word-break: break-word; }
    .admin-login { min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; padding: 2rem; background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(212,175,55,0.05), transparent); }
    .admin-login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 28px; padding: 3rem; width: 100%; max-width: 400px; text-align: center; }
    .admin-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(212,175,55,0.08); border: 1px solid var(--border); border-radius: 100px; padding: 0.4rem 1rem; font-size: 0.78rem; color: var(--gold); margin-bottom: 1.5rem; letter-spacing: 0.04em; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .toast { position: fixed; bottom: 2rem; right: 2rem; z-index: 9999; padding: 0.85rem 1.5rem; border-radius: 12px; font-size: 0.88rem; font-family: 'DM Sans', sans-serif; box-shadow: 0 8px 30px rgba(0,0,0,0.4); animation: slideUp 0.3s ease; max-width: 360px; color: #fff; }
    @keyframes slideUp { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; color: var(--text2); }
    @media (max-width: 768px) {
      .nav { padding: 0 1rem; }
      .dashboard { padding: 1rem; }
      .profile-grid { grid-template-columns: 1fr; }
      .admin-layout { flex-direction: column; }
      .admin-sidebar { width: 100%; display: flex; flex-direction: row; gap: 0.4rem; flex-wrap: wrap; padding: 0.75rem; border-right: none; border-bottom: 1px solid var(--border); }
      .admin-sidebar-title { display: none; }
      .sidebar-item { padding: 0.4rem 0.65rem; font-size: 0.8rem; }
      .admin-content { padding: 1rem; }
      .form-row { grid-template-columns: 1fr; }
      .wallet-card { flex-direction: column; align-items: flex-start; }
      .wallet-balance { font-size: 2rem; }
      .hero-stats { gap: 1.5rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ─── API BASE ─────────────────────────────────────────────────────────────
    const API = "";  // same origin; change to http://localhost:3000 for dev with separate servers

    async function apiFetch(path, options = {}) {
      const token = localStorage.getItem("token");
      const res = await fetch(API + path, {
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
          ...(options.headers || {}),
        },
        ...options,
        body: options.body ? JSON.stringify(options.body) : undefined,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    // ─── HELPERS ──────────────────────────────────────────────────────────────
    function formatINR(n) { return "₹" + Number(n || 0).toLocaleString("en-IN"); }
    function fmtDate(d) { if (!d) return "—"; return new Date(d).toLocaleDateString("en-IN"); }
    function fmtDateTime(d) { if (!d) return "—"; return new Date(d).toLocaleString("en-IN", { dateStyle: "medium", timeStyle: "short" }); }

    const icons = {
      wallet: "💰", invest: "📈", plan: "🗂️", users: "👥", settings: "⚙️",
      deposit: "💳", contact: "📞", logout: "🚪", home: "🏠",
      arrow: "→", star: "⭐", lock: "🔒", chart: "📊", bank: "🏦",
      withdraw: "💸", profile: "👤", shield: "🛡️", edit: "✏️", save: "💾",
      check: "✓", copy: "⎘", trash: "🗑️", eye: "👁️", plus: "➕"
    };

    // ─── PLAN CARD ────────────────────────────────────────────────────────────
    function PlanCard({ plan, onInvest, showBtn }) {
      const assetIcons = { BTC: "₿", USDT: "💵", GOLD: "🥇", FOREX: "💱" };
      const durLabel = plan.durationMins >= 60
        ? (plan.durationMins % 60 === 0 ? `${plan.durationMins / 60} Hour${plan.durationMins / 60 > 1 ? "s" : ""}` : `${Math.floor(plan.durationMins / 60)}h ${plan.durationMins % 60}m`)
        : `${plan.durationMins} Minutes`;
      return (
        <div className="plan-card" style={{ borderTopColor: plan.color }}>
          <div className="plan-asset-icon" style={{ background: (plan.color || "#D4AF37") + "20", color: plan.color || "var(--gold)" }}>{assetIcons[plan.asset] || "📈"}</div>
          <div className="plan-name">{plan.name}</div>
          <div className="plan-asset">{plan.asset} Trading</div>
          <div className="plan-return">+{plan.returnPct}%</div>
          <div className="plan-return-label">Return on Investment</div>
          <div className="plan-details">
            <div className="plan-detail-row"><span className="label">Min Invest</span><span className="value">{formatINR(plan.minInvest)}</span></div>
            <div className="plan-detail-row"><span className="label">Max Invest</span><span className="value">{formatINR(plan.maxInvest)}</span></div>
            <div className="plan-detail-row"><span className="label">Duration</span><span className="value">{durLabel}</span></div>
            <div className="plan-detail-row"><span className="label">Profit</span><span className="value" style={{ color: "var(--green)" }}>{plan.returnPct}% of invested</span></div>
          </div>
          {showBtn && <button className="btn btn-gold" style={{ width: "100%" }} onClick={onInvest}>Invest Now {icons.arrow}</button>}
        </div>
      );
    }

    // ─── HOME PAGE ────────────────────────────────────────────────────────────
    function HomePage({ setPage, currentUser }) {
      const [plans, setPlans] = useState([]);
      useEffect(() => {
        apiFetch("/api/plans").then(setPlans).catch(() => {});
      }, []);
      const quotes = [
        { text: "Do not save what is left after spending, but spend what is left after saving.", tag: "Warren Buffett" },
        { text: "An investment in knowledge pays the best interest.", tag: "Benjamin Franklin" },
        { text: "The stock market is a device for transferring money from the impatient to the patient.", tag: "Warren Buffett" },
        { text: "Risk comes from not knowing what you're doing.", tag: "Warren Buffett" },
        { text: "The individual investor should act consistently as an investor and not as a speculator.", tag: "Benjamin Graham" },
        { text: "Wide diversification is only required when investors do not understand what they are doing.", tag: "Warren Buffett" },
      ];
      return (
        <div className="page">
          <div className="hero">
            <div className="hero-bg" /><div className="hero-grid" />
            <div className="hero-content">
              <div className="hero-badge">⭐ India's Trusted Investment Platform</div>
              <h1 className="hero-title">Grow Your Wealth with <span className="accent">Smart Investments</span></h1>
              <p className="hero-sub">Invest in BTC, USDT, Gold & Forex with guaranteed returns. Start with as little as ₹500 and watch your money grow.</p>
              <div className="hero-cta">
                {currentUser ? (
                  <button className="btn btn-gold btn-large" onClick={() => setPage("dashboard")}>Go to Dashboard {icons.arrow}</button>
                ) : (
                  <>
                    <button className="btn btn-gold btn-large" onClick={() => setPage("register")}>Start Investing Today {icons.arrow}</button>
                    <button className="btn btn-outline btn-large" onClick={() => setPage("login")}>Login to Account</button>
                  </>
                )}
              </div>
              <div className="hero-stats">
                <div className="stat"><div className="stat-num">₹2Cr+</div><div className="stat-label">Total Invested</div></div>
                <div className="stat"><div className="stat-num">1,200+</div><div className="stat-label">Happy Investors</div></div>
                <div className="stat"><div className="stat-num">35%</div><div className="stat-label">Max Returns</div></div>
                <div className="stat"><div className="stat-num">100%</div><div className="stat-label">Secure Platform</div></div>
              </div>
            </div>
          </div>
          <div className="quotes-section">
            <h2 className="section-title">Wisdom from <span style={{ color: "var(--gold)" }}>The Greats</span></h2>
            <p className="section-sub">Let the world's best investors guide your financial journey</p>
            <div className="quotes-grid">
              {quotes.map((q, i) => (
                <div key={i} className="quote-card">
                  <div className="quote-text">{q.text}</div>
                  <div className="quote-tag">⭐ {q.tag}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="plans-section">
            <h2 className="section-title">Our <span style={{ color: "var(--gold)" }}>Investment Plans</span></h2>
            <p className="section-sub">Choose the plan that fits your goals</p>
            <div className="plans-grid">
              {plans.map(plan => <PlanCard key={plan._id} plan={plan} onInvest={() => setPage("register")} showBtn={!currentUser} />)}
            </div>
          </div>
        </div>
      );
    }

    // ─── LOGIN PAGE ───────────────────────────────────────────────────────────
    function LoginPage({ onLogin, setPage, showToast }) {
      const [form, setForm] = useState({ username: "", password: "" });
      const [err, setErr] = useState("");
      const [loading, setLoading] = useState(false);
      const inp = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const login = async () => {
        setErr(""); setLoading(true);
        try {
          const data = await apiFetch("/api/auth/login", { method: "POST", body: form });
          localStorage.setItem("token", data.token);
          onLogin(data.user);
          showToast(`Welcome back, ${data.user.name}! 👋`);
          setPage("dashboard");
        } catch (e) { setErr(e.message); }
        setLoading(false);
      };
      return (
        <div className="auth-page">
          <div className="auth-card">
            <h2 className="auth-title">Welcome Back</h2>
            <p className="auth-sub">Login to access your investment dashboard</p>
            {err && <div className="alert alert-error">{err}</div>}
            <div className="form-group"><label className="form-label">Username</label><input className="form-input" placeholder="your_username" value={form.username} onChange={e => inp("username", e.target.value)} /></div>
            <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" placeholder="••••••••" value={form.password} onChange={e => inp("password", e.target.value)} onKeyDown={e => e.key === "Enter" && login()} /></div>
            <button className="btn btn-gold btn-full" onClick={login} disabled={loading}>{loading ? <span className="spinner" /> : `Login ${icons.arrow}`}</button>
            <div className="auth-footer">Don't have an account? <a onClick={() => setPage("register")}>Register</a></div>
            <div className="auth-footer" style={{ marginTop: "0.5rem" }}><a onClick={() => setPage("forgot")}>Forgot Password?</a></div>
            <div className="auth-footer" style={{ marginTop: "1rem", borderTop: "1px solid var(--border)", paddingTop: "1rem" }}>
              <a onClick={() => setPage("admin-login")} style={{ color: "var(--text2)", fontSize: "0.8rem" }}>🛡️ Admin Login</a>
            </div>
          </div>
        </div>
      );
    }

    // ─── REGISTER PAGE ────────────────────────────────────────────────────────
    function RegisterPage({ onLogin, setPage, showToast }) {
      const [form, setForm] = useState({ name: "", username: "", email: "", mobile: "", password: "", confirm: "" });
      const [err, setErr] = useState("");
      const [loading, setLoading] = useState(false);
      const inp = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const register = async () => {
        setErr("");
        if (!form.name || !form.username || !form.email || !form.mobile || !form.password) { setErr("All fields are required."); return; }
        if (form.mobile.length !== 10) { setErr("Enter a valid 10-digit mobile number."); return; }
        if (form.password.length < 6) { setErr("Password must be at least 6 characters."); return; }
        if (form.password !== form.confirm) { setErr("Passwords do not match."); return; }
        setLoading(true);
        try {
          const data = await apiFetch("/api/auth/register", { method: "POST", body: { name: form.name, username: form.username, email: form.email, mobile: form.mobile, password: form.password } });
          localStorage.setItem("token", data.token);
          onLogin(data.user);
          showToast(`Account created! Welcome, ${data.user.name}! 🎉`);
          setPage("dashboard");
        } catch (e) { setErr(e.message); }
        setLoading(false);
      };
      return (
        <div className="auth-page">
          <div className="auth-card">
            <h2 className="auth-title">Create Account</h2>
            <p className="auth-sub">Join thousands of investors growing their wealth</p>
            {err && <div className="alert alert-error">{err}</div>}
            <div className="form-row">
              <div className="form-group"><label className="form-label">Full Name</label><input className="form-input" placeholder="Your full name" value={form.name} onChange={e => inp("name", e.target.value)} /></div>
              <div className="form-group"><label className="form-label">Username</label><input className="form-input" placeholder="username" value={form.username} onChange={e => inp("username", e.target.value.replace(/\s/g, ""))} /></div>
            </div>
            <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" placeholder="you@email.com" value={form.email} onChange={e => inp("email", e.target.value)} /></div>
            <div className="form-group"><label className="form-label">Mobile</label><input className="form-input" placeholder="10-digit mobile" maxLength={10} value={form.mobile} onChange={e => inp("mobile", e.target.value.replace(/\D/g, ""))} /></div>
            <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" placeholder="Min 6 characters" value={form.password} onChange={e => inp("password", e.target.value)} /></div>
            <div className="form-group"><label className="form-label">Confirm Password</label><input className="form-input" type="password" placeholder="Re-enter password" value={form.confirm} onChange={e => inp("confirm", e.target.value)} onKeyDown={e => e.key === "Enter" && register()} /></div>
            <button className="btn btn-gold btn-full" onClick={register} disabled={loading}>{loading ? <span className="spinner" /> : `Create Account ${icons.arrow}`}</button>
            <div className="auth-footer">Already have an account? <a onClick={() => setPage("login")}>Login</a></div>
          </div>
        </div>
      );
    }

    // ─── FORGOT PAGE ──────────────────────────────────────────────────────────
    function ForgotPage({ setPage }) {
      const [contact, setContact] = useState({ email: "", mobile: "" });
      useEffect(() => {
        apiFetch("/api/settings/public").then(d => setContact(d.contact)).catch(() => {});
      }, []);
      return (
        <div className="auth-page">
          <div className="auth-card" style={{ maxWidth: "480px" }}>
            <div style={{ textAlign: "center", marginBottom: "1.5rem" }}>
              <div style={{ fontSize: "3rem", marginBottom: "0.75rem" }}>🔒</div>
              <h2 className="auth-title">Forgot Password?</h2>
              <p className="auth-sub">Contact our support team to reset your password.</p>
            </div>
            <div style={{ background: "rgba(212,175,55,0.06)", border: "1px solid var(--border)", borderRadius: "14px", padding: "1.5rem", marginBottom: "1.5rem" }}>
              <div style={{ fontSize: "0.78rem", color: "var(--text2)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "1rem" }}>Contact Support</div>
              <div style={{ display: "flex", flexDirection: "column", gap: "0.9rem" }}>
                <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
                  <div style={{ width: "36px", height: "36px", borderRadius: "10px", background: "rgba(212,175,55,0.12)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.1rem" }}>📱</div>
                  <div><div style={{ fontSize: "0.78rem", color: "var(--text2)" }}>WhatsApp / Call</div><div style={{ color: "var(--text)", fontWeight: 500 }}>{contact.mobile}</div></div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
                  <div style={{ width: "36px", height: "36px", borderRadius: "10px", background: "rgba(212,175,55,0.12)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.1rem" }}>✉️</div>
                  <div><div style={{ fontSize: "0.78rem", color: "var(--text2)" }}>Email</div><div style={{ color: "var(--text)", fontWeight: 500 }}>{contact.email}</div></div>
                </div>
              </div>
            </div>
            <div className="auth-footer"><a onClick={() => setPage("login")}>← Back to Login</a></div>
          </div>
        </div>
      );
    }

    // ─── ADMIN LOGIN ──────────────────────────────────────────────────────────
    function AdminLoginPage({ onAdminLogin, setPage, showToast }) {
      const [form, setForm] = useState({ username: "", password: "" });
      const [err, setErr] = useState("");
      const [loading, setLoading] = useState(false);
      const login = async () => {
        setErr(""); setLoading(true);
        try {
          const data = await apiFetch("/api/auth/admin-login", { method: "POST", body: form });
          localStorage.setItem("adminToken", data.token);
          onAdminLogin();
          showToast("Admin login successful 🛡️");
          setPage("admin");
        } catch (e) { setErr(e.message); }
        setLoading(false);
      };
      return (
        <div className="admin-login">
          <div className="admin-login-card">
            <div className="admin-badge">🛡️ Administrator Access</div>
            <h2 className="auth-title" style={{ marginBottom: "0.5rem" }}>Admin Login</h2>
            <p className="auth-sub">Restricted to authorized personnel only</p>
            {err && <div className="alert alert-error">{err}</div>}
            <div className="form-group" style={{ textAlign: "left" }}><label className="form-label">Username</label><input className="form-input" value={form.username} onChange={e => setForm(f => ({ ...f, username: e.target.value }))} /></div>
            <div className="form-group" style={{ textAlign: "left" }}><label className="form-label">Password</label><input className="form-input" type="password" value={form.password} onChange={e => setForm(f => ({ ...f, password: e.target.value }))} onKeyDown={e => e.key === "Enter" && login()} /></div>
            <button className="btn btn-gold btn-full" onClick={login} disabled={loading}>{loading ? <span className="spinner" /> : "Login as Admin"}</button>
            <div className="auth-footer" style={{ marginTop: "1rem" }}><a onClick={() => setPage("login")}>← User Login</a></div>
          </div>
        </div>
      );
    }

    // ─── ADD MONEY MODAL ──────────────────────────────────────────────────────
    function AddMoneyModal({ onClose, showToast, onRefresh }) {
      const [step, setStep] = useState(1);
      const [amount, setAmount] = useState("");
      const [txnId, setTxnId] = useState("");
      const [loading, setLoading] = useState(false);
      const [payInfo, setPayInfo] = useState({});
      useEffect(() => {
        apiFetch("/api/settings/public").then(d => setPayInfo(d.paymentInfo)).catch(() => {});
      }, []);
      const copy = (text) => { navigator.clipboard.writeText(text); showToast("Copied! ⎘"); };
      const submit = async () => {
        if (!txnId.trim()) { showToast("Please enter transaction ID", "error"); return; }
        setLoading(true);
        try {
          await apiFetch("/api/deposits", { method: "POST", body: { amount: Number(amount), txnId } });
          showToast("Deposit request submitted! Awaiting admin approval. ✅");
          onRefresh();
          onClose();
        } catch (e) { showToast(e.message, "error"); }
        setLoading(false);
      };
      return (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal">
            <button className="modal-close" onClick={onClose}>✕</button>
            <h3 className="modal-title">Add Money to Wallet</h3>
            {step === 1 ? (
              <>
                <p className="modal-sub">Enter the amount you want to deposit</p>
                <div className="form-group">
                  <label className="form-label">Amount (₹)</label>
                  <input className="form-input" type="number" min="100" placeholder="Minimum ₹100" value={amount} onChange={e => setAmount(e.target.value)} />
                </div>
                <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginBottom: "1.25rem" }}>
                  {[500, 1000, 2000, 5000].map(v => <button key={v} className="btn btn-outline btn-sm" onClick={() => setAmount(String(v))}>₹{v.toLocaleString()}</button>)}
                </div>
                <button className="btn btn-gold btn-full" disabled={!amount || Number(amount) < 100} onClick={() => setStep(2)}>Continue {icons.arrow}</button>
              </>
            ) : (
              <>
                <p className="modal-sub">Send <strong style={{ color: "var(--gold)" }}>₹{Number(amount).toLocaleString()}</strong> to the account below, then enter your transaction ID.</p>
                <div className="payment-box">
                  {[["Account Name", payInfo.accountName], ["Account Number", payInfo.accountNumber], ["IFSC Code", payInfo.ifsc], ["Bank Name", payInfo.bankName], ["UPI ID", payInfo.upiId]].map(([k, v]) => v && (
                    <div key={k} className="payment-row">
                      <span className="key">{k}</span>
                      <span className="val">{v} <button className="copy-btn" onClick={() => copy(v)}>{icons.copy}</button></span>
                    </div>
                  ))}
                </div>
                <div className="form-group">
                  <label className="form-label">Transaction ID / UTR Number</label>
                  <input className="form-input" placeholder="Enter your transaction ID" value={txnId} onChange={e => setTxnId(e.target.value)} />
                </div>
                <div className="alert alert-info">After payment, your deposit will be approved within 1–4 hours.</div>
                <button className="btn btn-gold btn-full" onClick={submit} disabled={loading}>{loading ? <span className="spinner" /> : "Submit Deposit Request"}</button>
              </>
            )}
          </div>
        </div>
      );
    }

    // ─── INVEST MODAL ─────────────────────────────────────────────────────────
    function InvestModal({ plan, user, onClose, showToast, onRefresh }) {
      const [amount, setAmount] = useState(String(plan.minInvest));
      const [loading, setLoading] = useState(false);
      const profit = Math.round(Number(amount) * plan.returnPct / 100);
      const submit = async () => {
        if (!amount || Number(amount) < plan.minInvest || Number(amount) > plan.maxInvest) {
          showToast(`Amount must be ₹${plan.minInvest}–₹${plan.maxInvest}`, "error"); return;
        }
        if (Number(amount) > user.wallet) { showToast("Insufficient wallet balance", "error"); return; }
        setLoading(true);
        try {
          await apiFetch("/api/investments", { method: "POST", body: { planId: plan._id, amount: Number(amount) } });
          showToast(`Investment of ${formatINR(amount)} placed! 📈`);
          onRefresh();
          onClose();
        } catch (e) { showToast(e.message, "error"); }
        setLoading(false);
      };
      const durLabel = plan.durationMins >= 60
        ? `${plan.durationMins / 60} Hour${plan.durationMins / 60 > 1 ? "s" : ""}`
        : `${plan.durationMins} Minutes`;
      return (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal">
            <button className="modal-close" onClick={onClose}>✕</button>
            <h3 className="modal-title">Invest in {plan.name}</h3>
            <p className="modal-sub">Current wallet: <strong style={{ color: "var(--gold)" }}>{formatINR(user.wallet)}</strong></p>
            <div className="payment-box">
              {[["Asset", `${plan.asset} Trading`], ["Return", `+${plan.returnPct}%`], ["Duration", durLabel], ["Min", formatINR(plan.minInvest)], ["Max", formatINR(plan.maxInvest)]].map(([k, v]) => (
                <div key={k} className="payment-row"><span className="key">{k}</span><span className="val" style={k === "Return" ? { color: "var(--green)" } : {}}>{v}</span></div>
              ))}
            </div>
            <div className="form-group">
              <label className="form-label">Investment Amount (₹)</label>
              <input className="form-input" type="number" value={amount} onChange={e => setAmount(e.target.value)} min={plan.minInvest} max={Math.min(plan.maxInvest, user.wallet)} />
            </div>
            {amount && Number(amount) >= plan.minInvest && (
              <div className="alert alert-info">
                Expected profit: <strong style={{ color: "var(--green)" }}>+{formatINR(profit)}</strong> · You'll receive: <strong>{formatINR(Number(amount) + profit)}</strong>
              </div>
            )}
            <button className="btn btn-gold btn-full" onClick={submit} disabled={loading}>{loading ? <span className="spinner" /> : `Confirm Investment ${icons.arrow}`}</button>
          </div>
        </div>
      );
    }

    // ─── DASHBOARD ────────────────────────────────────────────────────────────
    function DashboardPage({ user, setModal, showToast, setPage }) {
      return (
        <div className="page">
          <div className="dashboard">
            <div className="dash-header">
              <h2 className="dash-welcome">Hello, <span>{user.name}</span> 👋</h2>
              <div className="dash-nav-pills">
                <button className="btn btn-outline btn-sm" onClick={() => setPage("profile")}>👤 Profile</button>
                <button className="btn btn-outline btn-sm" onClick={() => setPage("withdrawal")}>💸 Withdrawal</button>
                <button className="btn btn-outline btn-sm" onClick={() => setPage("contact")}>📞 Contact</button>
              </div>
            </div>
            <div className="wallet-card">
              <div>
                <div className="wallet-label">Your Wallet Balance</div>
                <div className="wallet-balance">{formatINR(user.wallet)}</div>
                <div style={{ fontSize: "0.8rem", color: "var(--text2)", marginTop: "0.5rem" }}>Available to invest</div>
              </div>
              <div className="wallet-actions">
                <button className="btn btn-gold" onClick={() => setModal("addMoney")}>+ Add Money</button>
                <button className="btn btn-outline" onClick={() => setPage("invest")}>📈 Invest Now</button>
              </div>
            </div>
            <div className="invest-cta">

    // ─── PROFILE PAGE ─────────────────────────────────────────────────────────
    function ProfilePage({ user, showToast, setPage, onRefresh }) {
      const [bank, setBank] = useState(user.bankDetails || { accountNumber: "", ifsc: "", bankName: "", accountHolder: "", upiId: "" });
      const [editPass, setEditPass] = useState({ old: "", new: "", confirm: "" });
      const [passErr, setPassErr] = useState("");
      const [saving, setSaving] = useState(false);
      const bInp = (k, v) => setBank(b => ({ ...b, [k]: v }));
      const saveBank = async () => {
        if (!bank.accountNumber || !bank.ifsc || !bank.bankName || !bank.accountHolder) { showToast("Please fill all required bank fields.", "error"); return; }
        setSaving(true);
        try {
          await apiFetch("/api/user/bank", { method: "PUT", body: bank });
          showToast("Bank details saved! 🏦");
        } catch (e) { showToast(e.message, "error"); }
        setSaving(false);
      };
      const changePass = async () => {
        setPassErr("");
        if (editPass.new.length < 6) { setPassErr("New password must be at least 6 characters."); return; }
        if (editPass.new !== editPass.confirm) { setPassErr("Passwords do not match."); return; }
        try {
          await apiFetch("/api/user/password", { method: "PUT", body: { oldPassword: editPass.old, newPassword: editPass.new } });
          showToast("Password changed! 🔒");
          setEditPass({ old: "", new: "", confirm: "" });
        } catch (e) { setPassErr(e.message); }
      };

    // ─── ADMIN PANEL ──────────────────────────────────────────────────────────
    function useAdminFetch(path, deps = []) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const load = useCallback(async () => {
        setLoading(true);
        try {
          const token = localStorage.getItem("adminToken");
          const res = await fetch(API + path, { headers: { Authorization: `Bearer ${token}` } });
          setData(await res.json());
        } catch {}
        setLoading(false);
      }, deps);
      useEffect(() => { load(); }, [load]);
      return { data, loading, reload: load };
    }

    async function adminPut(path, body) {
      const token = localStorage.getItem("adminToken");
      const res = await fetch(API + path, { method: "PUT", headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` }, body: JSON.stringify(body) });
      return res.json();
    }
    async function adminPost(path, body) {
      const token = localStorage.getItem("adminToken");
      const res = await fetch(API + path, { method: "POST", headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` }, body: JSON.stringify(body) });
      return res.json();
    }
    async function adminDelete(path) {
      const token = localStorage.getItem("adminToken");
      await fetch(API + path, { method: "DELETE", headers: { Authorization: `Bearer ${token}` } });
    }

        await adminPut(`/api/admin/plans/${id}`, edits[id]);
        showToast("Plan updated!"); reload();
      };
      const createPlan = async () => {
        await adminPost("/api/admin/plans", newPlan);
        showToast("Plan created!"); reload();
        setNewPlan({ name: "", asset: "BTC", minInvest: 500, maxInvest: 5000, returnPct: 15, durationMins: 60, color: "#D4AF37", active: true });
      };
      const togglePlan = async (plan) => {
        await adminPut(`/api/admin/plans/${plan._id}`, { ...plan, active: !plan.active });
        showToast(`Plan ${plan.active ? "disabled" : "enabled"}!`); reload();
      };
      const deletePlan = async (id) => {
        if (!confirm("Delete this plan?")) return;
        await adminDelete(`/api/admin/plans/${id}`);
        showToast("Plan deleted."); reload();
      };
      const eInp = (id, k, v) => setEdits(e => ({ ...e, [id]: { ...(e[id] || plans.find(p => p._id === id)), [k]: v } }));
      if (loading) return <div className="empty-state"><span className="spinner" /></div>;
      const assets = ["BTC", "USDT", "GOLD", "FOREX", "ETH", "XRP"];
      return (
        <div>
          <h2 className="admin-section-title">Investment Plans</h2>
          <p className="admin-section-sub">Manage active investment plans</p>
          <div className="admin-card">
            <h4>{icons.plus} Add New Plan</h4>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: "0.75rem" }}>
              {[["name","Plan Name","text"],["minInvest","Min Invest","number"],["maxInvest","Max Invest","number"],["returnPct","Return %","number"],["durationMins","Duration (mins)","number"],["color","Color","color"]].map(([k,l,t]) => (
                <div key={k}><label className="form-label">{l}</label><input className="edit-input" type={t} value={newPlan[k]} onChange={e => setNewPlan(p => ({ ...p, [k]: e.target.value }))} /></div>
              ))}
              <div><label className="form-label">Asset</label>
                <select className="edit-input" value={newPlan.asset} onChange={e => setNewPlan(p => ({ ...p, asset: e.target.value }))}>
                  {assets.map(a => <option key={a} value={a}>{a}</option>)}
                </select>
              </div>
            </div>
            <div style={{ marginTop: "1rem" }}><button className="btn btn-gold" onClick={createPlan}>Create Plan</button></div>
          </div>
          {plans?.map(plan => {
            const ed = edits[plan._id] || plan;
            return (
              <div key={plan._id} className="admin-card">
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem", flexWrap: "wrap", gap: "0.5rem" }}>
                  <h4 style={{ margin: 0 }}>{plan.name} <span className={`badge badge-${plan.active ? "success" : "rejected"}`}>{plan.active ? "Active" : "Inactive"}</span></h4>
                  <div style={{ display: "flex", gap: "0.5rem" }}>
                    <button className="btn btn-outline btn-sm" onClick={() => togglePlan(plan)}>{plan.active ? "Disable" : "Enable"}</button>
                    <button className="btn btn-danger btn-sm" onClick={() => deletePlan(plan._id)}>Delete</button>
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(150px,1fr))", gap: "0.75rem" }}>
                  {[["name","Plan Name"],["minInvest","Min Invest"],["maxInvest","Max Invest"],["returnPct","Return %"],["durationMins","Duration (mins)"]].map(([k,l]) => (
                    <div key={k}><label className="form-label">{l}</label><input className="edit-input" type="number" value={ed[k]} onChange={e => eInp(plan._id, k, e.target.value)} /></div>
                  ))}
                </div>
                <div style={{ marginTop: "1rem" }}><button className="btn btn-gold btn-sm" onClick={() => savePlan(plan._id)}>Save Changes</button></div>
              </div>
            );
          })}
        </div>
      );
    }

    function AdminPayment({ showToast }) {
      const { data, loading } = useAdminFetch("/api/settings/public");
      const [form, setForm] = useState({});
      useEffect(() => { if (data) setForm(data.paymentInfo || {}); }, [data]);
      const save = async () => {
        await adminPut("/api/admin/settings/payment", form);
        showToast("Payment info saved! 💳");
      };
      if (loading) return <div className="empty-state"><span className="spinner" /></div>;
      return (
        <div>
          <h2 className="admin-section-title">Payment Info</h2>
          <p className="admin-section-sub">Where users send deposits</p>
          <div className="admin-card">
            {[["accountName","Account Name"],["accountNumber","Account Number"],["ifsc","IFSC Code"],["bankName","Bank Name"],["upiId","UPI ID"]].map(([k,l]) => (
              <div key={k} className="form-group"><label className="form-label">{l}</label><input className="edit-input" value={form[k] || ""} onChange={e => setForm(f => ({ ...f, [k]: e.target.value }))} /></div>
            ))}
            <button className="btn btn-gold" onClick={save}>Save Payment Info</button>
          </div>
        </div>
      );
    }

    function AdminContact({ showToast }) {
      const { data, loading } = useAdminFetch("/api/settings/public");
      const [form, setForm] = useState({});
      useEffect(() => { if (data) setForm(data.contact || {}); }, [data]);
      const save = async () => {
        await adminPut("/api/admin/settings/contact", form);
        showToast("Contact info saved! 📞");
      };
      if (loading) return <div className="empty-state"><span className="spinner" /></div>;
      return (
        <div>
          <h2 className="admin-section-title">Contact Info</h2>
          <p className="admin-section-sub">Shown to users on the contact page</p>
          <div className="admin-card">
            {[["email","Email"],["mobile","Mobile / WhatsApp"],["address","Address"],["weekdayLabel","Weekday Label"],["weekdayHours","Weekday Hours"],["sundayHours","Sunday Hours"],["supportNote","Support Note"]].map(([k,l]) => (
              <div key={k} className="form-group"><label className="form-label">{l}</label><input className="edit-input" value={form[k] || ""} onChange={e => setForm(f => ({ ...f, [k]: e.target.value }))} /></div>
            ))}
            <button className="btn btn-gold" onClick={save}>Save Contact Info</button>
          </div>
        </div>
      );
    }

    function AdminInvestments({ showToast }) {
      const { data: investments, loading } = useAdminFetch("/api/admin/investments");
      if (loading) return <div className="empty-state"><span className="spinner" /></div>;
      return (
        <div>
          <h2 className="admin-section-title">All Investments</h2>
          <p className="admin-section-sub">{investments?.length || 0} total investments</p>
          <div className="admin-card" style={{ overflowX: "auto" }}>
            <table className="data-table">
              <thead><tr><th>User</th><th>Plan</th><th>Asset</th><th>Amount</th><th>Profit</th><th>Status</th><th>Matures At</th><th>Date</th></tr></thead>
              <tbody>
                {investments?.map(inv => (
                  <tr key={inv._id}>
                    <td><div>{inv.userName}</div><div style={{ color: "var(--text2)", fontSize: "0.78rem" }}>@{inv.userUsername}</div></td>
                    <td>{inv.planName}</td><td>{inv.asset}</td>
                    <td>{formatINR(inv.amount)}</td>
                    <td style={{ color: "var(--green)" }}>+{formatINR(inv.profit)}</td>
                    <td><span className={`badge badge-${inv.status === "completed" ? "success" : "running"}`}>{inv.status}</span></td>
                    <td>{fmtDateTime(inv.maturesAt)}</td>
                    <td>{fmtDate(inv.createdAt)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function AdminPanel({ setPage, showToast }) {
      const [section, setSection] = useState("overview");
      const sections = [
        { key: "overview", icon: "📊", label: "Overview" },
        { key: "users", icon: "👥", label: "Users" },
        { key: "deposits", icon: "💳", label: "Deposits" },
        { key: "withdrawals", icon: "💸", label: "Withdrawals" },
        { key: "investments", icon: "📈", label: "Investments" },
        { key: "plans", icon: "🗂️", label: "Plans" },
        { key: "payment", icon: "🏦", label: "Payment Info" },
        { key: "contact", icon: "📞", label: "Contact" },
      ];
      return (
        <div className="page">
          <div className="admin-layout">
            <div className="admin-sidebar">
              <div className="admin-sidebar-title">Admin Panel</div>
              {sections.map(s => (
                <div key={s.key} className={`sidebar-item ${section === s.key ? "active" : ""}`} onClick={() => setSection(s.key)}>{s.icon} {s.label}</div>
              ))}
              <div style={{ marginTop: "auto", paddingTop: "1rem" }}>
                <div className="sidebar-item" onClick={() => setPage("home")} style={{ color: "var(--text2)" }}>🏠 View Site</div>
              </div>
            </div>
            <div className="admin-content">
              {section === "overview" && <AdminOverview showToast={showToast} />}
              {section === "users" && <AdminUsers showToast={showToast} />}
              {section === "deposits" && <AdminDeposits showToast={showToast} />}
              {section === "withdrawals" && <AdminWithdrawals showToast={showToast} />}
              {section === "investments" && <AdminInvestments showToast={showToast} />}
              {section === "plans" && <AdminPlans showToast={showToast} />}
              {section === "payment" && <AdminPayment showToast={showToast} />}
              {section === "contact" && <AdminContact showToast={showToast} />}
            </div>
          </div>
        </div>
      );
    }

    // ─── MAIN APP ─────────────────────────────────────────────────────────────
    function App() {
      const [page, setPage] = useState("home");
      const [currentUser, setCurrentUser] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [modal, setModal] = useState(null);
      const [toast, setToast] = useState(null);
      const [appLoading, setAppLoading] = useState(true);

      const showToast = useCallback((msg, type = "success") => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3500);
      }, []);

      // Expose globals for child components
      window.__showToast = showToast;

      const refreshUser = useCallback(async () => {
        const token = localStorage.getItem("token");
        if (!token) return;
        try {
          const user = await apiFetch("/api/user/me");
          setCurrentUser(user);
        } catch {}
      }, []);

      window.__refreshUser = refreshUser;

      // Auto-login on mount
      useEffect(() => {
        const token = localStorage.getItem("token");
        const adminToken = localStorage.getItem("adminToken");
        if (adminToken) {
          // Verify admin token
          fetch(API + "/api/admin/overview", { headers: { Authorization: `Bearer ${adminToken}` } })
            .then(r => { if (r.ok) { setIsAdmin(true); setPage("admin"); } else localStorage.removeItem("adminToken"); })
            .finally(() => setAppLoading(false));
        } else if (token) {
          apiFetch("/api/user/me")
            .then(user => { setCurrentUser(user); setPage("dashboard"); })
            .catch(() => localStorage.removeItem("token"))
            .finally(() => setAppLoading(false));
        } else {
          setAppLoading(false);
        }
      }, []);

      // Poll user data every 30s when logged in
      useEffect(() => {
        if (!currentUser) return;
        const interval = setInterval(refreshUser, 30000);
        return () => clearInterval(interval);
      }, [currentUser, refreshUser]);

      const handleLogout = () => {
        localStorage.removeItem("token");
        localStorage.removeItem("adminToken");
        setCurrentUser(null);
        setIsAdmin(false);
        setPage("home");
        showToast("Logged out successfully");
      };

      const nav = (p) => { setPage(p); setModal(null); window.scrollTo(0, 0); };
      const toastColors = { success: "#16a34a", error: "#dc2626", info: "#2563eb", warning: "#d97706" };

      if (appLoading) return (
        <div className="loading-screen">
          <div style={{ fontSize: "2.5rem", fontFamily: "Playfair Display, serif", color: "var(--gold)" }}>Invest with Anshu</div>
          <div className="spinner" style={{ width: "28px", height: "28px", borderColor: "rgba(212,175,55,0.3)", borderTopColor: "var(--gold)" }} />
        </div>
      );

      return (
        <>
          <div className="app">
            <nav className="nav">
              <div className="nav-brand" onClick={() => nav("home")}>Invest <span>with</span> Anshu</div>
              <div className="nav-actions">
                {currentUser ? (
                  <>
                    <div className="nav-wallet" onClick={() => nav("dashboard")}>{icons.wallet} {formatINR(currentUser.wallet)}</div>
                    <div className="nav-user-pill" onClick={() => nav("profile")}>👤 {currentUser.name.split(" ")[0]}</div>
                    <button className="btn btn-gold btn-sm" onClick={() => nav("dashboard")}>Dashboard</button>
                    <button className="btn btn-ghost" onClick={handleLogout}>{icons.logout}</button>
                  </>
                ) : isAdmin ? (
                  <>
                    <span style={{ color: "var(--gold)", fontSize: "0.82rem", padding: "0.4rem 0.75rem", background: "rgba(212,175,55,0.08)", border: "1px solid var(--border)", borderRadius: "8px" }}>🛡️ Admin Panel</span>
                    <button className="btn btn-ghost" onClick={handleLogout}>{icons.logout} Logout</button>
                  </>
                ) : (
                  <>
                    <button className="btn btn-outline" onClick={() => nav("login")}>Login</button>
                    <button className="btn btn-gold" onClick={() => nav("register")}>Register</button>
                  </>
                )}
              </div>
            </nav>

            {toast && <div className="toast" style={{ background: toastColors[toast.type] || toastColors.success }}>{toast.msg}</div>}

            {page === "home" && <HomePage setPage={nav} currentUser={currentUser} />}
            {page === "login" && <LoginPage onLogin={setCurrentUser} setPage={nav} showToast={showToast} />}
            {page === "register" && <RegisterPage onLogin={setCurrentUser} setPage={nav} showToast={showToast} />}
            {page === "forgot" && <ForgotPage setPage={nav} />}
            {page === "admin-login" && <AdminLoginPage onAdminLogin={() => setIsAdmin(true)} setPage={nav} showToast={showToast} />}
            {page === "dashboard" && currentUser && <DashboardPage user={currentUser} setModal={setModal} showToast={showToast} setPage={nav} />}
            {page === "invest" && currentUser && <InvestPage user={currentUser} setPage={nav} setModal={setModal} />}
            {page === "profile" && currentUser && <ProfilePage user={currentUser} showToast={showToast} setPage={nav} onRefresh={refreshUser} />}
            {page === "withdrawal" && currentUser && <WithdrawalPage user={currentUser} showToast={showToast} setPage={nav} />}
            {page === "admin" && isAdmin && <AdminPanel setPage={nav} showToast={showToast} />}
            {page === "contact" && <ContactPage />}

            {modal === "addMoney" && currentUser && <AddMoneyModal onClose={() => setModal(null)} showToast={showToast} onRefresh={refreshUser} />}
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
